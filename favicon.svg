<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>
  <!-- Background Box with Rotation -->
  <rect width="80" height="80" x="10" y="10" rx="20" fill="url(#grad)" transform="rotate(12 50 50)" />
  <!-- Text HX -->
  <text x="50" y="52" font-family="sans-serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="central" transform="rotate(-12 50 50)">
    HX
  </text>
</svg>

